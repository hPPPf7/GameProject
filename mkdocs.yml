site_name: GameProject 文件
theme:
  name: material
nav:
  - 首頁: index.md
  - 角色: characters.md
  - 事件: events.md
  - 時間線: timeline.md
  - 流程圖: flowchart.md

plugins:
  - search

extra_javascript:
  - https://unpkg.com/mermaid@10.4.0/dist/mermaid.min.js
  - js/enable-mermaid.js

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.tabbed
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.tasklist
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.emoji
  - pymdownx.betterem
